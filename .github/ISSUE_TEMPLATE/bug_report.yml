name: Bug report
description: Report a defect in the foundation or product
title: 'fix: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Please do **not** report security vulnerabilities here. Use [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web
        - api
        - worker
        - prisma
        - docker / ci
        - docs
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: main @ abc1234
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, environment (redact secrets)
