name: Deploy Development

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Build, deploy, and smoke test (development)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start database dependencies
        run: docker compose -f infrastructure/docker/docker-compose.yml up -d postgres redis

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f infrastructure/docker/docker-compose.yml exec -T postgres pg_isready -U rpm -d rpm; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Apply database migrations
        run: |
          pnpm install --frozen-lockfile
          pnpm prisma:generate
          pnpm prisma:migrate:deploy

      - name: Build and start development stack
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml build api web worker
          docker compose -f infrastructure/docker/docker-compose.yml up -d api web worker

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          docker compose -f infrastructure/docker/docker-compose.yml logs api
          exit 1

      - name: Smoke test meta endpoints
        run: |
          curl -fsS http://localhost:3001/v1/meta/version | tee version.json
          curl -fsS -H "X-Request-ID: ci-smoke-test" http://localhost:3001/v1/meta/ping | tee ping.json
          grep -q '"service":"api"' version.json
          grep -q '"message":"pong"' ping.json
          grep -q '"correlationId":"ci-smoke-test"' ping.json

      - name: Smoke test worker health
        run: curl -fsS http://localhost:3002/health

      - name: Smoke test web
        run: curl -fsS http://localhost:3000/status | grep -q "Platform status"

      - name: Tear down stack
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.yml down -v
