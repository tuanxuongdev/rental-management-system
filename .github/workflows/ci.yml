name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rpm
          POSTGRES_PASSWORD: rpm
          POSTGRES_DB: rpm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rpm -d rpm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy env template
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public

      - name: Verify migration status
        run: pnpm prisma:migrate:status
        env:
          DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public

      - name: Build shared contracts
        run: pnpm --filter @rpm/contracts build

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Import boundaries
        run: pnpm boundaries

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @rpm/contracts build

      - name: Run unit tests
        run: pnpm unit

  integration:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rpm
          POSTGRES_PASSWORD: rpm
          POSTGRES_DB: rpm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rpm -d rpm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public

      - name: Run integration tests
        run: pnpm integration
        env:
          DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public
          TEST_DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public

  isolation-tests:
    name: Organization isolation / portfolio suite (M2–M3)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rpm
          POSTGRES_PASSWORD: rpm
          POSTGRES_DB: rpm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rpm -d rpm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public

      - name: Run isolation / authorization suite
        run: pnpm isolation
        env:
          DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public
          TEST_DATABASE_URL: postgresql://rpm:rpm@localhost:5432/rpm_test?schema=public

  sca:
    name: Software composition analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm sca

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  containers:
    name: Container build and scan
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          tags: rpm-api:ci
          load: true

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          tags: rpm-web:ci
          load: true

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          tags: rpm-worker:ci
          load: true

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rpm-api:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan Web image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rpm-web:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rpm-worker:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  commitlint:
    name: Commitlint (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
